name: ketora_app
description: "KETORA – Tu guía keto inteligente para hispanohablantes."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────────────
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  bloc: ^8.1.4

  # ── Navigation ───────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Firebase ─────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.0
  firebase_analytics: ^11.2.0

  # ── IA / GEM (Gemini) ─────────────────────────────────────────
  google_generative_ai: ^0.4.6
  flutter_markdown: ^0.7.4

  # ── Monetización ──────────────────────────────────────────────
  purchases_flutter: ^8.0.0          # RevenueCat

  # ── Networking ───────────────────────────────────────────────
  dio: ^5.5.0
  retrofit: ^4.1.0

  # ── Local storage ────────────────────────────────────────────
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ── Charts / UI ──────────────────────────────────────────────
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10

  # ── Barcode / Cámara ─────────────────────────────────────────
  mobile_scanner: ^5.0.0
  image_picker: ^1.1.2

  # ── Notificaciones ───────────────────────────────────────────
  flutter_local_notifications: ^17.2.1
  firebase_messaging: ^15.1.0
  timezone: ^0.9.4

  # ── DI ───────────────────────────────────────────────────────
  get_it: ^7.6.7

  # ── Utilidades ───────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.4.0
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

  # ── Íconos ───────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
